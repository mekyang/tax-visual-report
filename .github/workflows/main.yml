name: Build and Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: 税诉通-Windows
            pyinstaller_opts: --onefile --windowed --add-data "index.html;."

          - os: ubuntu-22.04-arm
            artifact: 税诉通-Linux-ARM64
            pyinstaller_opts: --onefile --add-data "index.html:."

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: report-template
        run: npm install && npm run build

      - name: Copy template to root
        shell: bash
        run: cp report-template/dist/index.html index.html

      # ---- Windows: Python 3.8 兼容 Win7 ----
      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        run: pip install pandas==1.5.3 openpyxl==3.1.2 xlrd==2.0.1 pyinstaller==5.13.2

      # ---- Linux ARM64: Conda Python 解决 glibc 兼容性 ----
      - name: Setup Miniconda (Linux ARM64)
        if: runner.os == 'Linux'
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          channels: conda-forge,defaults
          auto-activate: true
          activate-environment: base

      - name: Install Python deps (Linux ARM64)
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: conda install -y pandas openpyxl xlrd pyinstaller tk

      # ---- PyInstaller 打包 ----
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller ${{ matrix.pyinstaller_opts }} --name "税诉通" shengc.py

      - name: Build with PyInstaller (Linux ARM64)
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: pyinstaller ${{ matrix.pyinstaller_opts }} --name "税诉通" shengc.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/税诉通.exe
            dist/税诉通
